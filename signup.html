<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title></title>

    <!-- Font Icon -->
    <link rel="stylesheet" href="loginandsignup/fonts/material-icon/css/material-design-iconic-font.css">

    <!-- Main css -->
    <link rel="stylesheet" href="loginandsignup/css/style.css">

    <!-- Entrance animations (matches the rest of the site) -->
    <link rel="stylesheet" href="css/auth-anim.css">

    <!-- Modern "Save Food" green reskin (loaded last to override) -->
    <link rel="stylesheet" href="css/auth-theme.css">
</head>

<body>

    <div class="main">

        <section class="signup">
            <!-- <img src="images/signup-bg.jpg" alt=""> -->
            <div class="container">
                <div class="signup-content">
                    <div class="auth-brand"><span class="auth-mark"></span> Save Food</div>
                    <form method="POST" id="signup-form" class="signup-form">
                        <h2 class="form-title">Create your account</h2>
                        <div class="form-group">
                            <input type="text" class="form-input" name="name" id="name" placeholder="Your Name" />
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-input" name="email" id="emaill" placeholder="Your Email" />
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" name="password" id="passwordd"
                                placeholder="Password" />
                            <span toggle="#passwordd" class="zmdi zmdi-eye field-icon toggle-password"></span>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" name="re_password" id="re_password"
                                placeholder="Repeat your password" />
                        </div>

                        <div class="form-group">
                            <input type="submit" name="submit" id="submitt" class="form-submit" value="Sign up" />
                        </div>
                        <div class="auth-divider"><span>or sign up with</span></div>
                        <div class="social-auth">
                            <button type="button" id="google-login" class="social-btn google"><i class="zmdi zmdi-google"></i> Google</button>
                            <button type="button" id="github-login" class="social-btn github"><i class="zmdi zmdi-github"></i> GitHub</button>
                        </div>
                        <p class="loginhere">
                            already have  an account ? <a href="log in.html" class="loginhere-link">Login here</a>
                        </p>
                        <p class="loginhere2">
                            just here for some information?  <a href="index.html" class="loginhere-link">be a guest!</a>
                        </p>
                        
                          
                    </form>
                    
                    
                </div>
                
            </div>
            
        </section>

    </div>

    <!-- JS -->
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <script src="js/auth-password.js"></script>

    <!-- Firebase auth (shared config) -->
    <script type="module" src="js/auth-signup.js"></script>
    <script type="module" src="js/auth-social.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Join Us: Save Food</title>
	<link rel="stylesheet" href="css/bootstrap.min.css">
	<link rel="stylesheet" href="css/animate.min.css">
	<link rel="stylesheet" href="css/font-awesome.min.css">
	<link rel="stylesheet" href="css/ionicons.min.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/food-theme.css">
	<link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700,300' rel='stylesheet' type='text/css'>
	<style>
		.join-wrap { max-width: 600px; margin: 0 auto; padding: 64px 20px 72px; text-align: center; }
		.join-wrap h1 { font-family: var(--display); text-transform: uppercase; letter-spacing: -0.03em;
			font-size: clamp(2.2rem, 6vw, 3.4rem); line-height: 0.98; color: var(--kale); margin: 0; }
		.join-stamp { display: inline-block; margin-bottom: 22px; padding: 7px 14px; transform: rotate(-3deg);
			font-family: var(--mono); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em;
			color: var(--kale); background: var(--kraft); border: 2px solid var(--kale); border-radius: 4px;
			box-shadow: 3px 3px 0 var(--kale); }
		.pledge { font-family: var(--display); font-weight: 700; font-size: 1.5rem; line-height: 1.3;
			letter-spacing: -0.02em; color: var(--ink); margin: 18px auto 18px; max-width: 460px; }
		.join-count { font-family: var(--mono); font-size: 0.92rem; letter-spacing: 0.04em;
			color: var(--signal-2); margin-bottom: 28px; }
		.join-form { max-width: 380px; margin: 0 auto; text-align: left; }
		.join-form input { display: block; width: 100%; margin: 0 0 14px; padding: 13px 16px;
			border: 2px solid var(--line); border-radius: 8px; font-size: 15px; box-sizing: border-box;
			background: var(--paper-2); font-family: var(--body); color: var(--ink); }
		.join-form input:focus { outline: none; border-color: var(--kale); background: #fff;
			box-shadow: 3px 3px 0 var(--kale); }
		.join-form button { width: 100%; border: 2px solid var(--kale); border-radius: 6px; padding: 14px 20px;
			color: #fff; font-family: var(--body); font-weight: 700; font-size: 1rem; cursor: pointer;
			background: var(--signal); box-shadow: 4px 4px 0 var(--kale);
			transition: transform .1s ease, box-shadow .1s ease, background .15s; }
		.join-form button:hover { background: var(--signal-2); transform: translate(2px, 2px);
			box-shadow: 2px 2px 0 var(--kale); }
		.join-thanks { display: none; font-family: var(--display); color: var(--sprout); font-weight: 700;
			font-size: 1.2rem; margin-top: 8px; }
	</style>
</head>
<body>

	<div class="preloader"><div class="sk-spinner sk-spinner-pulse"></div></div>

	<div class="gh-nav-container">
	   <div class="gh-nav-inner">
	      <div class="gh-brand"><a href="index.html">Save Food</a></div>
	      <nav class="gh-tab-bar" role="tablist">
	         <a href="index.html" class="gh-tab-item">Home</a>
	         <a href="about.html" class="gh-tab-item">About</a>
	         <a href="blog.html" class="gh-tab-item">Blog</a>
	         <a href="stories.html" class="gh-tab-item">Stories</a>
	         <a href="join-us.html" class="gh-tab-item">Join Us</a>
	         <a href="eatmefirst.html" class="gh-tab-item">EatMeFirst</a>
	         <a href="donate.html" class="gh-tab-item">Donate</a>
	         <a href="log in.html" class="gh-tab-item">login</a>
	      </nav>
	   </div>
	</div>

	<main class="join-wrap">
		<span class="join-stamp wow fadeIn">The pledge</span>
		<h1 class="wow fadeIn">Join Us</h1>
		<p class="pledge wow fadeInUp">"I pledge to waste less food and help feed more people."</p>
		<p class="join-count" id="joinCount">Loading the count...</p>

		<form class="join-form wow fadeInUp" id="joinForm">
			<input type="text" id="joinName" placeholder="Your name" required>
			<input type="email" id="joinEmail" placeholder="Your email" required>
			<button type="submit" id="joinSubmit">Add my name</button>
		</form>
		<p class="join-thanks" id="joinThanks">Thank you for joining. Your name is in.</p>
	</main>

	<footer>
		<div class="container">
			<div class="row">
				<div class="col-md-12 col-sm-12">
					<p class="wow fadeInUp">Copyright 2024 Save Food. Together we waste less and feed more.</p>
				</div>
			</div>
		</div>
	</footer>

	<script src="js/jquery.js"></script>
	<script src="js/wow.min.js"></script>
	<script src="js/custom.js"></script>

	<script type="module">
		import { auth, db } from "./js/firebase-config.js";
		import { ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
		import { signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

		const pledges = ref(db, "pledges");          // names + emails — never read on the client
		const pledgeCount = ref(db, "pledgeCount");  // a single public integer — safe to read
		const countEl = document.getElementById("joinCount");
		const form = document.getElementById("joinForm");
		const thanks = document.getElementById("joinThanks");
		const submit = document.getElementById("joinSubmit");

		let authReady = false;
		let countShown = false;

		const ANON_DISABLED_MSG =
			"Pledges need anonymous sign-in, which isn't enabled yet. In the Firebase Console: Authentication → Sign-in method → Anonymous → Enable.";

		// "Provider not enabled" surfaces under different codes on classic
		// Firebase Auth vs Identity Platform — match all of them.
		const isAnonDisabled = (code) =>
			code === "auth/operation-not-allowed" ||
			code === "auth/admin-restricted-operation" ||
			code === "auth/configuration-not-found";

		function setCount(text) { if (countEl) countEl.textContent = text; }

		// The live count reads ONLY /pledgeCount — a single number, never the
		// names or emails — so it can be public and exposes no personal data.
		onValue(pledgeCount, (snap) => {
			countShown = true;
			const n = snap.val() || 0;
			setCount(n === 1 ? "1 person has joined" : n + " people have joined");
		}, (err) => {
			countShown = true;
			console.warn("[join] count read failed:", err);
			setCount(""); // hide the line rather than show visitors an error
		});

		// Sign in anonymously so visitors can pledge — no account needed.
		signInAnonymously(auth).catch((err) => {
			console.error("[join] anonymous sign-in failed:", err);
			if (isAnonDisabled((err && err.code) || "")) console.warn(ANON_DISABLED_MSG);
		});
		onAuthStateChanged(auth, (user) => { authReady = !!user; });

		// Watchdog: if /pledgeCount never responds, just clear the placeholder.
		setTimeout(() => {
			if (!countShown && countEl && /loading/i.test(countEl.textContent)) {
				console.warn("[join] count watchdog: /pledgeCount never responded");
				setCount("");
			}
		}, 8000);

		form.addEventListener("submit", async (e) => {
			e.preventDefault();
			const name = document.getElementById("joinName").value.trim();
			const email = document.getElementById("joinEmail").value.trim();
			if (!name || !email) return;
			submit.disabled = true;
			submit.textContent = "Adding...";
			try {
				if (!authReady) await signInAnonymously(auth); // ensure a session before writing
				await push(pledges, { name, email, ts: Date.now() });
				// Bump the public counter (best-effort — the pledge is what matters).
				runTransaction(pledgeCount, (cur) => (cur || 0) + 1)
					.catch((err) => console.warn("[join] counter increment failed:", err));
				form.style.display = "none";
				thanks.style.display = "block";
			} catch (err) {
				submit.disabled = false;
				submit.textContent = "Add my name";
				const reason = (err && (err.message || err.code)) || "Unknown error";
				if (err && isAnonDisabled(err.code)) {
					alert(ANON_DISABLED_MSG);
				} else if (err && err.code === "PERMISSION_DENIED") {
					alert("Couldn't add your name: the database rejected the pledge (PERMISSION_DENIED). Your Realtime Database rules must allow signed-in users to write to /pledges.");
				} else {
					alert("Couldn't add your name — " + reason);
				}
				console.error("[join] pledge write failed:", err);
			}
		});
	</script>
</body>
</html>
